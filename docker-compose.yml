services:
  rks-ad:
    build: .
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
