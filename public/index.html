<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKS.Ad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); 
            color: white; 
            margin:0; 
            min-height:100vh; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
        }
        .logo-letter { 
            display:inline-block; 
            cursor:default; 
            transition: all 0.4s ease; 
        }
        .logo-letter:hover { 
            color: #00f5ff; 
            text-shadow: 0 0 25px #00f5ff; 
            transform: scale(1.1); 
        }
        .particle { 
            position: absolute; 
            pointer-events: none; 
            width: 5px; 
            height: 5px; 
            background: #00f5ff; 
            border-radius: 50%; 
            animation: float 7s linear forwards; 
        }
        @keyframes float { 
            0% {transform: translateY(0) scale(1); opacity:0.8;} 
            100% {transform: translateY(-120vh) scale(0); opacity:0;} 
        }
        .live-dot { animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0.3;} }
    </style>
</head>
<body>

    <div class="text-center w-full max-w-4xl px-6 relative">
        <!-- RKS.Ad Logo -->
        <div class="text-8xl md:text-[9rem] font-bold tracking-tighter flex justify-center gap-4 mb-12" id="logo">
            <span class="logo-letter text-white" data-name="RAVI">R</span>
            <span class="logo-letter text-white" data-name="KUMAR">K</span>
            <span class="logo-letter text-white" data-name="SHARMA">S</span>
            <span class="text-cyan-400">.</span>
            <span class="logo-letter text-cyan-400" data-name="ADVOCATE">Ad</span>
        </div>

        <!-- Live Visitors -->
        <div class="flex justify-center mb-10">
            <div class="bg-zinc-900 border border-red-500/50 rounded-2xl px-6 py-3 flex items-center gap-3">
                <span class="inline-block w-3 h-3 bg-red-500 rounded-full live-dot"></span>
                <span class="text-red-400 font-medium">LIVE VISITORS</span>
                <span id="live-visitors" class="font-mono text-xl font-bold text-red-400">186</span>
            </div>
        </div>

        <!-- Three Buttons -->
        <div class="flex flex-col sm:flex-row gap-6 justify-center mb-20">
            <a href="https://cal.id/lawup" target="_blank" 
               class="flex items-center gap-3 px-8 py-5 bg-white/10 hover:bg-white/20 border border-white/40 rounded-3xl text-lg font-medium">
                <i class="fa-solid fa-calendar-days text-2xl"></i>
                Book Consultation
            </a>
            
            <a href="mailto:iam@rks.ad" 
               class="flex items-center gap-3 px-8 py-5 bg-cyan-500 hover:bg-cyan-400 text-black rounded-3xl text-lg font-medium">
                <i class="fa-solid fa-envelope"></i>
                iam@rks.ad
            </a>

            <a href="https://ecourtsindia.com/advocate/ravi-kumar-sharma" target="_blank" 
               class="flex items-center gap-3 px-8 py-5 bg-white/10 hover:bg-white/20 border border-white/40 rounded-3xl text-lg font-medium">
                <i class="fa-solid fa-gavel"></i>
                See Cases
            </a>
        </div>

        <!-- Rating -->
        <div class="text-5xl flex items-center justify-center gap-4 mb-12">
            <span class="text-yellow-400">4.9</span>
            <span class="text-yellow-400">★★★★☆</span>
        </div>

        <!-- Total Visits -->
        <div>
            <div class="text-gray-400 tracking-widest mb-2">TOTAL VISITS TILL DATE</div>
            <div id="live-counter" class="text-7xl md:text-8xl font-bold text-cyan-400">—</div>
        </div>
    </div>

    <div id="mouse-trail" class="fixed inset-0 pointer-events-none z-10"></div>

    <script>
        // Hover Tooltips
        document.querySelectorAll('.logo-letter').forEach(function(el) {
            el.addEventListener('mouseenter', function() {
                var tip = document.createElement('div');
                tip.textContent = this.getAttribute('data-name');
                tip.style.cssText = 'position:absolute;background:#00f5ff;color:#000;padding:8px 22px;border-radius:50px;font-weight:700;font-size:15px;z-index:9999;white-space:nowrap;box-shadow:0 10px 30px rgba(0,245,255,0.5);';
                document.body.appendChild(tip);

                var rect = this.getBoundingClientRect();
                tip.style.left = (rect.left + window.scrollX + (rect.width/2) - (tip.offsetWidth/2)) + 'px';
                tip.style.top = (rect.top + window.scrollY - 55) + 'px';

                setTimeout(function(){ tip.remove(); }, 1600);
            });
        });

        // Mouse Trail
        document.addEventListener('mousemove', function(e){
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.getElementById('mouse-trail').appendChild(p);
            setTimeout(function(){p.remove();}, 7000);
        });

        // Random Live Visitors
        function randomLiveVisitors() {
            const el = document.getElementById('live-visitors');
            let previous = 186;
            setInterval(() => {
                let randomNum;
                do {
                    randomNum = Math.floor(Math.random() * 280) + 25;
                } while (randomNum === previous);
                el.textContent = randomNum;
                previous = randomNum;
            }, 2500);
        }

        // Total Counter
        async function loadCounter() {
            const el = document.getElementById('live-counter');
            el.innerHTML = '•••';
            try {
                let res = await fetch('/api/counter');
                let data = await res.json();
                el.textContent = Number(data.count).toLocaleString('en-IN');
            } catch(e) {
                el.innerHTML = '•••';
            }
        }

        window.onload = function() {
            loadCounter();
            randomLiveVisitors();
        };
    </script>
</body>
</html>
